<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHIDAO Protocol</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050510;
            color: #ffffff;
            font-family: -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .glow-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at 50% 0%, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 25px;
        }

        .logo-img {
            width: 140px;
            height: 140px;
            object-fit: contain;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4));
            animation: pulse 3s infinite;
        }

        .title {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #f5d05a, #d4af37, #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
        }

        .subtitle {
            font-size: 11px;
            color: #d4af37;
            margin-top: 4px;
            letter-spacing: 6px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .subtitle::before, .subtitle::after {
            content: '—';
            margin: 0 8px;
            opacity: 0.5;
        }

        .card {
            background: linear-gradient(145deg, #0d0d1f, #111128);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 360px;
            margin-bottom: 15px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.05);
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .status-label {
            color: #666;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-badge {
            background: rgba(212, 175, 55, 0.15);
            color: #d4af37;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .username {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .server-tag {
            background: rgba(212, 175, 55, 0.1);
            color: #d4af37;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            display: inline-block;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .traffic-section {
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }

        .traffic-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .traffic-text {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .traffic-value {
            font-size: 11px;
            color: #d4af37;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #b8860b, #f5d05a);
            border-radius: 2px;
            width: 0%;
            transition: width 1s ease;
        }

        .weather-card {
            background: linear-gradient(145deg, #0d0d1f, #111128);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 20px 25px;
            width: 100%;
            max-width: 360px;
            margin-bottom: 15px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.05);
        }

        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .weather-title {
            color: #666;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .weather-city {
            color: #d4af37;
            font-size: 11px;
        }

        .weather-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .weather-temp {
            font-size: 42px;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }

        .weather-temp span {
            font-size: 20px;
            color: #d4af37;
        }

        .weather-icon {
            font-size: 40px;
        }

        .weather-desc {
            color: #888;
            font-size: 13px;
            margin-top: 8px;
        }

        .weather-details {
            display: flex;
            gap: 15px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }

        .weather-detail {
            font-size: 11px;
            color: #666;
        }

        .weather-detail span {
            color: #d4af37;
        }

        .btn {
            width: 100%;
            max-width: 360px;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #d4af37, #f5d05a, #b8860b);
            color: #050510;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-primary:active { transform: scale(0.97); }

        .btn-secondary {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: #d4af37;
        }

        .btn-secondary:active { transform: scale(0.97); }

        .config-box {
            background: #0a0a18;
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            max-width: 360px;
            margin-bottom: 12px;
            word-break: break-all;
            font-size: 10px;
            color: rgba(212, 175, 55, 0.7);
            display: none;
            font-family: monospace;
        }

        .divider {
            width: 100%;
            max-width: 360px;
            height: 1px;
            background: rgba(212, 175, 55, 0.1);
            margin: 5px 0 15px;
        }

        .footer {
            color: rgba(212, 175, 55, 0.2);
            font-size: 10px;
            text-align: center;
            margin-top: auto;
            padding: 20px 0;
            letter-spacing: 3px;
        }

        .success {
            background: linear-gradient(135deg, #d4af37, #f5d05a) !important;
            color: #050510 !important;
        }

        @keyframes pulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4)); }
            50% { filter: drop-shadow(0 0 35px rgba(212, 175, 55, 0.7)); }
        }
    </style>
</head>
<body>
    <div class="glow-bg"></div>
    <div class="content">
        <div class="header">
            <img src="https://i.ibb.co/zWKdX5fR/1774282029359.png"
                 class="logo-img" alt="ZHIDAO Logo">
            <div class="title">ZHIDAO</div>
            <div class="subtitle">Protocol</div>
        </div>

        <div class="card">
            <div class="status-row">
                <span class="status-label">Статус</span>
                <span class="status-badge" id="status">● Загрузка...</span>
            </div>
            <div class="username" id="username">Загрузка...</div>
            <div class="server-tag">🇭🇰 Hong Kong</div>
            <div class="traffic-section">
                <div class="traffic-label">
                    <span class="traffic-text">Использовано трафика</span>
                    <span class="traffic-value" id="trafficValue">—</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </div>

        <div class="weather-card">
            <div class="weather-header">
                <span class="weather-title">Погода</span>
                <span class="weather-city">📍 Пекин</span>
            </div>
            <div class="weather-main">
                <div>
                    <div class="weather-temp" id="weatherTemp">—<span>°C</span></div>
                    <div class="weather-desc" id="weatherDesc">Загрузка...</div>
                </div>
                <div class="weather-icon" id="weatherIcon">🌤</div>
            </div>
            <div class="weather-details">
                <div class="weather-detail">💧 Влажность: <span id="weatherHumidity">—</span>%</div>
                <div class="weather-detail">💨 Ветер: <span id="weatherWind">—</span> м/с</div>
                <div class="weather-detail">🌡 Ощущается: <span id="weatherFeels">—</span>°C</div>
            </div>
        </div>

        <button class="btn btn-primary" id="getConfig" onclick="getConfig()">
            ⚡ Получить конфиг
        </button>

        <div class="config-box" id="configBox"></div>

        <button class="btn btn-secondary" id="copyBtn" style="display:none" onclick="copyConfig()">
            📋 Скопировать ссылку
        </button>

        <button class="btn btn-secondary" onclick="showHelp()">
            📖 Инструкция
        </button>

        <div class="divider"></div>

        <button class="btn btn-secondary" onclick="contactAdmin()">
            💬 Написать администратору
        </button>

        <div class="footer">ZHIDAO PROTOCOL © 2026</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const API_URL = 'https://hk.marucho.icu:8443';
        const WEATHER_KEY = '03232b342b9270f8b24ed68e2c55d8f4';
        let userConfig = null;

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('username').textContent =
                user.first_name + (user.last_name ? ' ' + user.last_name : '');
            loadUserData(user.id);
        } else {
            document.getElementById('username').textContent = 'Пользователь';
            document.getElementById('status').textContent = '● Нет данных';
        }

        loadWeather();

        async function loadUserData(telegramId) {
            try {
                const r = await fetch(`${API_URL}/api/user/${telegramId}`);
                if (r.ok) {
                    const data = await r.json();
                    userConfig = data.link;
                    document.getElementById('status').textContent = '● Активен';
                    document.getElementById('username').textContent = data.username;
                    const used = data.used_traffic || 0;
                    const usedGB = (used / 1024 / 1024 / 1024).toFixed(2);
                    document.getElementById('trafficValue').textContent = usedGB + ' GB';
                    const percent = Math.min((used / (10 * 1024 * 1024 * 1024)) * 100, 100);
                    setTimeout(() => {
                        document.getElementById('progressFill').style.width = percent + '%';
                    }, 300);
                } else {
                    document.getElementById('status').textContent = '● Не найден';
                    document.getElementById('username').textContent = 'Нет подписки';
                }
            } catch(e) {
                document.getElementById('status').textContent = '● Офлайн';
                document.getElementById('username').textContent = 'Ошибка связи';
            }
        }

        async function loadWeather() {
            try {
                const r = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?id=1816670&appid=${WEATHER_KEY}&units=metric&lang=ru`
                );
                const data = await r.json();
                const temp = Math.round(data.main.temp);
                const feels = Math.round(data.main.feels_like);
                const desc = data.weather[0].description;
                const humidity = data.main.humidity;
                const wind = data.wind.speed;
                const weatherId = data.weather[0].id;

                document.getElementById('weatherTemp').innerHTML = `${temp}<span>°C</span>`;
                document.getElementById('weatherDesc').textContent = desc.charAt(0).toUpperCase() + desc.slice(1);
                document.getElementById('weatherHumidity').textContent = humidity;
                document.getElementById('weatherWind').textContent = wind;
                document.getElementById('weatherFeels').textContent = feels;
                document.getElementById('weatherIcon').textContent = getWeatherIcon(weatherId);
            } catch(e) {
                document.getElementById('weatherDesc').textContent = 'Недоступно';
            }
        }

        function getWeatherIcon(id) {
            if (id >= 200 && id < 300) return '⛈';
            if (id >= 300 && id < 400) return '🌦';
            if (id >= 500 && id < 600) return '🌧';
            if (id >= 600 && id < 700) return '❄️';
            if (id >= 700 && id < 800) return '🌫';
            if (id === 800) return '☀️';
            if (id === 801) return '🌤';
            if (id === 802) return '⛅';
            return '☁️';
        }

        async function getConfig() {
            const user = tg.initDataUnsafe?.user;
            if (!user) {
                tg.showAlert('Откройте через Telegram бота');
                return;
            }
            if (userConfig) {
                document.getElementById('configBox').textContent = userConfig;
                document.getElementById('configBox').style.display = 'block';
                document.getElementById('copyBtn').style.display = 'block';
            } else {
                tg.showAlert('Конфиг не найден. Сначала активируйте код через /start КОД в боте.');
            }
        }

        function copyConfig() {
            if (userConfig) {
                navigator.clipboard.writeText(userConfig);
                const btn = document.getElementById('copyBtn');
                btn.textContent = '✅ Скопировано!';
                btn.classList.add('success');
                setTimeout(() => {
                    btn.textContent = '📋 Скопировать ссылку';
                    btn.classList.remove('success');
                }, 2000);
            }
        }

        function showHelp() {
            tg.showPopup({
                title: 'Инструкция',
                message: '1. Нажмите "Получить конфиг"\n2. Нажмите "Скопировать ссылку"\n3. Откройте Happ → + → вставьте ссылку\n4. Подключитесь!',
                buttons: [{type: 'ok'}]
            });
        }

        function contactAdmin() {
            tg.openTelegramLink('https://t.me/christianpastor');
        }
    </script>
</body>
</html>
