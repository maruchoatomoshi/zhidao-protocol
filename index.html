    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Имя пользователя из Telegram
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('username').textContent = 
                user.first_name + (user.last_name ? ' ' + user.last_name : '');
        } else {
            document.getElementById('username').textContent = 'Пользователь';
        }

        function getConfig() {
            tg.sendData('get_config');
            const btn = document.getElementById('getConfig');
            btn.textContent = '✅ Запрос отправлен';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = 'Получить конфиг';
                btn.classList.remove('copied');
            }, 2000);
        }

        function showHelp() {
            tg.showPopup({
                title: 'Инструкция',
                message: '1. Скачайте Happ\n2. Нажмите "Получить конфиг"\n3. Скопируйте ссылку в Happ\n4. Подключитесь!',
                buttons: [{type: 'ok'}]
            });
        }

        function contactAdmin() {
            tg.openTelegramLink('https://t.me/christianpastor');
